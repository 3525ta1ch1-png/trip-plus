{% extends "base.html" %}
{% block title %}メールアドレス変更{% endblock %}

{% block content %}
<div class="email-change-card" style="max-width:520px;">
  <h2 style="margin-top:0;">メールアドレス変更</h2>

  <div style="margin:12px 0;">
    <div class="muted" style="margin-bottom:6px;">現在のメールアドレス</div>
    <input type="text" value="{{ current_email }}" readonly style="background:#f3f4f6;">
  </div>

  <form method="post">
    {% csrf_token %}

    <div style="margin:12px 0;">
      {{ form.new_email.label_tag }}
      {{ form.new_email }}
      {% if form.new_email.errors %}
        <div style="color:#ef4444; font-size:13px; margin-top:6px;">
          {{ form.new_email.errors|striptags }}
        </div>
      {% endif %}
    </div>

    <div style="margin-top:14px;">
      <button class="btn" type="submit">変更する</button>
      <a class="btn btn-sub" href="{% url 'accounts:home' %}" style="margin-left:8px;">戻る</a>
    </div>
  </form>
</div>
{% endblock %}
